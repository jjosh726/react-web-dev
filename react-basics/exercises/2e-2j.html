<!DOCTYPE html>
<html>
  <head>
    <title>Exercise 2e-2j</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script type="text/babel">
      // 2e - 2j
      function ProductDetails({ name, price, discountPrice, imageSrc }) {
        return (
          <div>
            <img src={imageSrc} width="100" /> 
            <p>{name}</p>

            {discountPrice 
              ? (
                <>
                  <del>Price: ${price.toFixed(2)}</del>
                  <p>Discount price: ${discountPrice}</p>
                </>
              ) : (
                <>
                  <p>Price: ${price.toFixed(2)}</p>
                </>
              )
            }
              
            <button>Add to Cart</button>
          </div>
        );
      }

      function App() {
        return (
          <>
            <ProductDetails 
              name="Cotton socks" 
              price={10.9} 
              discountPrice={5.45} 
              imageSrc="./2-images/cotton-socks.png"
            />
            <ProductDetails 
              name="Tennis balls" 
              price={6}
              imageSrc="./2-images/tennis-balls.png"
            />
            <ProductDetails 
              name="Plain T-shirt" 
              price={7.99}
              imageSrc="./2-images/plain-t-shirt.png"
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
      
    </script>
  </body>
</html>
