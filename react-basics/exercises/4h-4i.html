<!DOCTYPE html>
<html>
    <head>
        <title>Exercise 4h-4i</title>
        <style>
            body {
                margin: 0;
            }

            .app-container {
                display: flex;
                height: 100vh;
                width: 100vw;

                justify-content: center;
                align-items: center;

                background-color: rgb(222, 222, 222);
            }

            button {
                background-color: rgb(25, 135, 74);

                margin: 0.3em;
                padding: 1em;

                color: white;
                border: none;
            }
        </style>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
        <script type="text/babel">

            function App() {
                const [count, setCount] = React.useState(0);

                const clickButtonRef = React.useRef(null);

                function autoClick() {
                    setInterval(() => {
                        const buttonElem = clickButtonRef.current;
                        if (buttonElem) {
                            buttonElem.click();
                        }
                    }, 1000);
                }

                const increaseCount = () => setCount(count + 1);
                const resetCount = () => setCount(0);
                
                return (
                    <div className="app-container">
                        <button 
                            onClick={increaseCount} 
                            ref={clickButtonRef}
                        >
                            Clicked {count} {count !== 1 ? "times" : "time"}
                        </button>

                        <button onClick={resetCount}>
                            Reset
                        </button>
                        <button onClick={autoClick}>
                            Auto Click
                        </button>
                    </div>
                );
            }
            

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
